# Example workspace. Copy this directory to workspaces/<your-name> and edit the values.
# One workspace = one MCP server instance, bound to a single scope. No secrets live here;
# the Bridge password is read from PROTONBOUND_BRIDGE_PASSWORD at connect time.

name: clients
description: >
  Agent-facing description: when SHOULD this workspace be used (and when not). This is
  advertised to the model at connect time, so be specific about purpose and boundaries.

account:
  # Proton Bridge loopback endpoints (defaults below). IMAP is always used; SMTP is only
  # touched when mail.allow_smtp is true (see below).
  imap_host: 127.0.0.1
  imap_port: 1143
  smtp_host: 127.0.0.1
  smtp_port: 1025
  # Your PRIMARY Proton Bridge IMAP/SMTP login (Bridge → account → Mailbox configuration).
  # This is the account you log in with, not an alias.
  username: you@example.com
  # Default sender for newly composed drafts. Optional: defaults to `username`. Set this to
  # draft new mail *as* an alias. (Replies prefer whichever alias the original was addressed
  # to — see scope.addresses below — regardless of this value.)
  from_address: you@example.com
  # Optional TLS cert pinning for the Bridge loopback (currently enforced on the IMAP
  # connection). Capture the value with `protonbound --show-cert --workspace <this file>`,
  # then paste it here; the server will refuse to connect (before sending credentials) if
  # Bridge ever presents a different cert. Strongly recommended whenever allow_smtp is true.
  # bridge_cert_sha256: "<64-hex-sha256>"

# What the agent may do and see. Everything below is enforced in code, not by prompting.
mail:
  # Permission tier. Only two exist; there is no send tier anywhere in the server.
  #   readonly   -> read/search/fetch threads within scope
  #   read-write -> the above plus drafting and housekeeping (still never sends)
  permission: read-write

  # Optional drafting voice/style guidance (read-write only). Rendered into the always-on
  # instructions next to the draft guidance, so every reply is authored this way. Keep it to
  # HOW to write (tone, sign-off, CC policy); WHEN to use the workspace belongs in
  # `description` above. Omit to add no voice line.
  voice: >
    Professional, concise, and friendly. Address the client by name and sign off with your name.

  # What the agent may READ. Deny-by-default with combination (AND) semantics: a message is
  # in scope only if it is in an allowed source AND (if set) matches the address allow-list
  # AND (if require_starred) is starred.
  scope:
    # Allowed source mailboxes (folders and/or labels), named exactly as Bridge reports them.
    # A subfolder does not include its parent — list each mailbox you want in scope. To use
    # set_label, the label mailbox must itself appear here.
    sources:
      - "Folders/Clients"

    # Curation gate, ANDed with sources. When true, only STARRED messages are visible.
    # (Star maps to the IMAP \Flagged flag in Bridge.)
    require_starred: false

    # Optional address allow-list, ANDed with sources. Matches From/To/Cc OR the delivery
    # headers (Delivered-To / X-Original-To / Envelope-To), so mail BCC'd to an alias is
    # captured too. An empty list means "sources alone gate"; a bare `addresses:` key is
    # None and is rejected, so keep it an explicit empty list when unused.
    #
    # These addresses ALSO bound outbound send: when allow_smtp is true and this list is set,
    # the workspace may only send AS one of these aliases, and account.from_address (above)
    # must be one of them — so a 'career' workspace can never send from a 'comedy' alias.
    addresses: []

  # Named system mailboxes used as WRITE TARGETS only (never read scope). `drafts` is
  # required for read-write; `trash` is required when allow_delete is true.
  write_targets:
    drafts: Drafts
    trash: Trash

  # Whether the delete_message tool is offered (moves to write_targets.trash).
  allow_delete: false

  # Whether drafts may attach arbitrary LOCAL files by path. Off by default. Re-attaching a
  # file already on in-scope mail ({"from_message": ..., "index": N}) is always allowed; this
  # flag only governs reading the local filesystem ({"path": ...}), which is an extra surface.
  allow_local_attachments: false

  # Per-attachment size ceiling, in megabytes (Proton's own message limit is ~25 MB total).
  max_attachment_mb: 25

  # Optional workspace signature (plain text). When set, the draft/send tools append it below
  # the message under the standard "-- " delimiter. It is added VERBATIM by code — the model
  # never writes or edits it, it only passes append_signature=true/false (default true) to
  # choose whether to include it. Proton Bridge does NOT add your Proton account signature to
  # mail composed here, so define it here if you want one. Leave unset for no signature.
  # signature: |
  #   Jane Doe
  #   Acme Co — contact@example.com

  # Outbound SMTP send. Off by default and SEPARATE from the permission tier — there is no
  # "send" tier; send is an explicit capability toggle like allow_delete. When false, smtplib
  # is never imported and the send_draft tool is never registered, so the agent is
  # structurally blind to any send capability. Set true ONLY where human-supervised sending is
  # intended; pin bridge_cert_sha256 above when you do, since send transmits your Bridge
  # credentials over the loopback.
  allow_smtp: false

  # EXPLICIT tool allow-list (DENY-FIRST). The LLM-facing surface is exactly the tools named
  # here and nothing else — not even get_workspace_info unless listed. This list defaults to
  # empty, so a workspace that names no tools exposes none. A tool may be listed only if its
  # prerequisite is enabled above: write tools need permission: read-write, delete_message needs
  # allow_delete, send_draft needs allow_smtp. The list NARROWS what the tiers permit; it never
  # grants a capability (the live surface is tier/flag-permitted ∩ this list). The set below is
  # the full read + draft/housekeeping surface for this read-write, no-delete, no-send workspace;
  # trim it to expose less, and add delete_message / send_draft only after enabling their flags.
  tools:
    - get_workspace_info
    - list_folders
    - digest
    - get_thread
    - get_message
    - search_mail
    - draft_reply
    - save_draft
    - update_draft
    - set_read
    - set_star
    - move_message
    - set_label
